<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="description" content="团队内部使用的 AI 文案辅助工具，不提供登录、支付或软件下载。">
<title>文案台 · 团队内部 AI 内容工具</title>
<style>
:root{
  --bg:#0a0b0f;--surface:rgba(255,255,255,.04);--surface-2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.10);--border-strong:rgba(255,255,255,.18);
  --text:#edeef2;--text-2:#9aa0ab;--text-3:#676c77;
  --accent:#34c77b;--accent-text:#5fe09c;--accent-weak:rgba(52,199,123,.14);
  --r:18px;--r-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI","Noto Sans SC",sans-serif;
}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.aurora{position:fixed;top:-240px;left:50%;transform:translateX(-50%);width:1300px;max-width:160vw;height:620px;z-index:0;pointer-events:none;filter:blur(96px);opacity:.55;transition:opacity .5s;
  background:radial-gradient(38% 60% at 26% 42%,rgba(120,86,224,.55),transparent 70%),radial-gradient(38% 60% at 50% 28%,rgba(56,118,222,.5),transparent 70%),radial-gradient(42% 58% at 70% 48%,rgba(47,196,158,.5),transparent 70%),radial-gradient(34% 52% at 86% 34%,rgba(214,124,92,.4),transparent 70%);
  animation:drift 26s ease-in-out infinite}
body.chat .aurora{opacity:.2}
@keyframes drift{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-45%) translateY(14px)}}
.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 22px;height:100%;display:flex;flex-direction:column}
nav{display:flex;align-items:center;gap:18px;height:60px;flex:0 0 auto}
.brand{font-size:15px;font-weight:500;letter-spacing:.04em}.brand .a{color:var(--accent-text)}
.nav-links{display:flex;gap:4px;margin-left:8px}
.nav-link{font-size:14px;color:var(--text-2);padding:6px 12px;border-radius:var(--r-sm);cursor:pointer;text-decoration:none;transition:.15s}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-link.on{color:var(--text);background:var(--surface-2)}
.spacer{flex:1}
.gear,.newchat{display:inline-flex;align-items:center;justify-content:center;height:34px;border-radius:var(--r-sm);color:var(--text-2);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:.15s}
.gear{width:34px}.newchat{gap:6px;padding:0 12px;font-size:13px;display:none}
body.chat .newchat{display:inline-flex}
.gear:hover,.newchat:hover{color:var(--text);border-color:var(--border-strong)}
main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0 40px;min-height:0}
body.chat main{justify-content:flex-start;padding-top:8px}
.hero{text-align:center;margin:0 0 28px}
body.chat .hero,body.chat .below{display:none}
h1{font-size:30px;font-weight:500;line-height:1.28;margin:0 0 10px}
.sub{font-size:15px;color:var(--text-2);margin:0}
.thread{display:none;flex:1;overflow-y:auto;flex-direction:column;gap:16px;padding:8px 2px 18px;min-height:0}
body.chat .thread{display:flex}
.msg{max-width:88%;font-size:15px;line-height:1.7;border-radius:var(--r);padding:12px 15px;animation:rise .22s ease both;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--accent-weak);border:1px solid var(--accent);color:var(--text)}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
.msg.ai .foot{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:9px;border-top:1px solid var(--border)}
.msg.ai .body .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent-text);border-radius:50%;animation:rot .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}
.tag{font-size:11.5px;color:var(--text-3)}
.copy{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-family:var(--font);color:var(--text-2);background:transparent;border:1px solid var(--border);padding:5px 11px;border-radius:var(--r-sm);cursor:pointer;transition:.15s}
.copy:hover{color:var(--text);border-color:var(--border-strong)}
.copy svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.box{flex:0 0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);transition:border-color .16s,box-shadow .16s}
.box:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-weak)}
textarea{width:100%;border:0;outline:0;resize:none;background:transparent;color:var(--text);font-family:var(--font);font-size:16px;line-height:1.7;padding:14px 14px 6px;min-height:84px;max-height:220px;overflow-y:auto}
body.chat textarea{min-height:52px}
textarea::placeholder{color:var(--text-3)}
textarea,.thread{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.22) transparent}
textarea::-webkit-scrollbar,.thread::-webkit-scrollbar{width:8px;height:8px}
textarea::-webkit-scrollbar-track,.thread::-webkit-scrollbar-track{background:transparent}
textarea::-webkit-scrollbar-thumb,.thread::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
textarea::-webkit-scrollbar-thumb:hover,.thread::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.34)}
textarea::-webkit-scrollbar-button{display:none;height:0;width:0}
.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:6px 6px 4px}
.bar-l,.bar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-family:var(--font);padding:7px 13px;border-radius:999px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;transition:.15s}
.pill:hover{color:var(--text);border-color:var(--border-strong)}
.pill[aria-pressed="true"]{background:var(--accent-weak);color:var(--accent-text);border-color:var(--accent)}
.pill svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px}
.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-2);background:none;border:0;padding:6px;border-radius:var(--r-sm)}
.toggle:hover{color:var(--text)}
.track{width:34px;height:19px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);position:relative;transition:.15s;flex:0 0 auto}
.knob{position:absolute;top:1px;left:1px;width:15px;height:15px;border-radius:50%;background:var(--text-3);transition:.16s}
.toggle[aria-checked="true"] .track{background:var(--accent-weak);border-color:var(--accent)}
.toggle[aria-checked="true"] .knob{transform:translateX(15px);background:var(--accent-text)}
.send{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;font-family:var(--font);padding:8px 18px;border-radius:var(--r-sm);background:var(--accent);color:#072013;border:0;cursor:pointer;transition:.15s}
.send:hover{filter:brightness(1.08)}.send:disabled{opacity:.55;cursor:default;filter:none}
.send svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.gloss{text-align:center;font-size:13px;color:var(--text-3);margin:14px 0 0}.gloss b{color:var(--accent-text);font-weight:500}
.chips-row{margin-top:22px}
.chips-label{font-size:12.5px;color:var(--text-3);margin:0 0 10px;text-align:center}
.chips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.chip{font-size:13px;padding:8px 14px;border-radius:999px;background:var(--surface);color:var(--text-2);border:1px solid var(--border);cursor:pointer;transition:.15s}
.chip:hover{color:var(--text);border-color:var(--border-strong)}
.hint{text-align:center;margin-top:12px;font-size:13px;color:var(--accent-text);display:none}.hint.show{display:block}
.safety-note{text-align:center;margin:18px 0 0;font-size:12px;color:var(--text-3);line-height:1.7}
.safety-note strong{color:var(--text-2);font-weight:500}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (prefers-reduced-transparency:reduce){.box{-webkit-backdrop-filter:none;backdrop-filter:none;background:#14161c}}
@media (max-width:540px){h1{font-size:24px}.bar-r{margin-left:auto}}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="wrap">
  <nav>
    <span class="brand">文案<span class="a">台</span></span>
    <div class="nav-links">
      <a class="nav-link on" href="/">文案</a>
      <a class="nav-link" href="/make" title="原来的图片/视频制作流程，先保留">制作</a>
      <a class="nav-link" href="/tutorial" title="使用须知与注意事项">教程</a>
    </div>
    <span class="spacer"></span>
    <button class="newchat" id="newchat"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>新建</button>
  </nav>

  <main>
    <div class="hero">
      <h1>把口播文案改得更顺、更能爆</h1>
      <p class="sub">贴进来直接改，或者先说你想改成啥。</p>
    </div>

    <div class="thread" id="thread"></div>

    <div class="box">
      <textarea id="input" placeholder="把口播文案或脚本贴进来，或者直接说你想改成啥..."></textarea>
      <div class="bar">
        <div class="bar-l" id="caps">
          <button class="pill" data-k="迭代" aria-pressed="true"><svg viewBox="0 0 24 24"><path d="M20 11a8.1 8.1 0 0 0-15.5-2m-.5-4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg>迭代</button>
          <button class="pill" data-k="套壳" aria-pressed="false"><svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>套壳</button>
          <button class="pill" data-k="爆款植入" aria-pressed="false"><svg viewBox="0 0 24 24"><path d="M12 12c2-2.96 0-7-1-8 0 3-1.77 4.74-3 6-1.23 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.53-1.06-3.94-2-5-1.79 3-2.79 3-4 2z"/></svg>爆款植入</button>
          <span class="sep"></span>
          <button class="toggle" id="think" role="switch" aria-checked="true"><span class="track"><span class="knob"></span></span><span>思考拆解</span></button>
        </div>
        <div class="bar-r">
          <button class="send" id="go"><svg viewBox="0 0 24 24"><path d="M10 14 21 3"/><path d="M21 3l-6.5 18a.55.55 0 0 1-1 0l-3.5-7-7-3.5a.55.55 0 0 1 0-1L21 3"/></svg><span id="go-label">改</span></button>
        </div>
      </div>
    </div>

    <p class="hint" id="hint">先把文案贴进来，或者点上面的方向。</p>

    <div class="below">
      <p class="gloss" id="gloss"><b>迭代</b>：同一个内容，换说法或调长短</p>
      <div class="chips-row">
        <p class="chips-label" id="chips-label">迭代 · 试试这些</p>
        <div class="chips" id="chips">
          <button class="chip">改得更口语化</button>
          <button class="chip">再来一版换个说法</button>
          <button class="chip">缩成 15 秒版</button>
        </div>
      </div>
      <p class="safety-note"><strong>团队内部 AI 内容工具</strong><br>本站不要求账号、密码、验证码或支付信息，请勿提交个人隐私和商业机密。</p>
    </div>
  </main>
</div>

<script>
// ==================== 方向数据 ====================
const DATA={
  "迭代":{gloss:"同一个内容，换说法或调长短",chips:["改得更口语化","再来一版换个说法","缩成 15 秒版","拉长到 45 秒","换个钩子开头"]},
  "套壳":{gloss:"把这篇套到别的景点或项目",chips:["套到九寨沟","换成方特乐园","套到这家酒店","换成故宫","套到迪士尼"]},
  "爆款植入":{gloss:"在别人的爆款里，自然插进我们的广告",chips:["在这篇里插火车票","找个位置插广告","这篇适合嫁接吗","植入酒店券","植入门票券"]}
};
// ==================== SSE 流式 ====================
async function streamAi(url,body,callbacks){
  const{onContent,onDone,onError}=callbacks;
  const controller=new AbortController();
  let settled=false,timer;
  const finish=(kind,value)=>{
    if(settled)return;
    settled=true;clearTimeout(timer);
    if(kind==='done'&&onDone)onDone(value);
    if(kind==='error'&&onError)onError(value);
  };
  const armTimeout=()=>{
    clearTimeout(timer);
    timer=setTimeout(()=>controller.abort(),55000);
  };
  try{
    armTimeout();
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:controller.signal});
    if(!r.ok){const t=await r.text().catch(()=>'');throw new Error('HTTP '+r.status+' '+t.slice(0,200));}
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='',hasContent=false;
    while(true){
      const{value,done}=await reader.read();if(done)break;armTimeout();
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const L of lines){
        if(!L.startsWith('data: '))continue;
        try{const d=JSON.parse(L.slice(6));
          if(d.type==='content'&&onContent){hasContent=true;onContent(d.text);}
          else if(d.type==='done')finish('done',d);
          else if(d.type==='error')finish('error',d.message);
        }catch(e){}
      }
    }
    // 服务端或代理提前断开时也必须解除“思考中”状态。
    if(!settled){
      if(hasContent)finish('done',{interrupted:true});
      else finish('error','连接提前中断，请重试');
    }
  }catch(e){
    finish('error',e.name==='AbortError'?'生成超时，请重试':e.message);
  }finally{
    clearTimeout(timer);
  }
}
// ==================== UI 元素 ====================
const caps=document.getElementById('caps'),chips=document.getElementById('chips');
const chipsLabel=document.getElementById('chips-label'),gloss=document.getElementById('gloss');
const input=document.getElementById('input'),thread=document.getElementById('thread');
let CURRENT='迭代',isStreaming=false;
// 输入框自动长高
function auto(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,220)+'px';}
input.addEventListener('input',auto);
// 方向胶囊
caps.addEventListener('click',e=>{
  const b=e.target.closest('.pill');if(!b||b.dataset.k===undefined)return;
  caps.querySelectorAll('.pill[data-k]').forEach(x=>x.setAttribute('aria-pressed','false'));
  b.setAttribute('aria-pressed','true');CURRENT=b.dataset.k;
  const d=DATA[CURRENT];
  chips.querySelectorAll('.chip').forEach((c,i)=>c.textContent=d.chips[i]||'');
  chipsLabel.textContent=CURRENT+' · 试试这些';
  gloss.innerHTML='<b>'+CURRENT+'</b>：'+d.gloss;
});
// 示例 chip
chips.addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  input.value=(input.value?input.value.trim()+'\n':'')+c.textContent;auto();input.focus();
});
// 思考拆解
const think=document.getElementById('think');
think.addEventListener('click',()=>think.setAttribute('aria-checked',think.getAttribute('aria-checked')==='true'?'false':'true'));
// 添加消息到 thread
function addUser(t){
  const m=document.createElement('div');m.className='msg user';m.textContent=t;thread.appendChild(m);return m;
}
function addAI(){
  const m=document.createElement('div');m.className='msg ai';
  const body=document.createElement('div');body.className='body';
  body.innerHTML='<span class="spin"></span> 思考中';
  const foot=document.createElement('div');foot.className='foot';
  foot.innerHTML='<span class="tag">'+CURRENT+' · 改好了</span>';
  const btn=document.createElement('button');btn.className='copy';
  btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>复制';
  btn.addEventListener('click',()=>{
    navigator.clipboard&&navigator.clipboard.writeText(body.textContent);
    const o=btn.innerHTML;btn.innerHTML='已复制';setTimeout(()=>btn.innerHTML=o,1200);
  });
  foot.appendChild(btn);m.appendChild(body);m.appendChild(foot);thread.appendChild(m);
  return {msg:m,body:body,foot:foot};
}
// ==================== 主提交按钮 ====================
const go=document.getElementById('go'),goLabel=document.getElementById('go-label'),hint=document.getElementById('hint');
go.addEventListener('click',()=>{
  const text=input.value.trim();
  if(!text){hint.classList.add('show');return;}
  if(isStreaming)return;
  hint.classList.remove('show');isStreaming=true;go.disabled=true;goLabel.textContent='在改';

  document.body.classList.add('chat');
  addUser(text);input.value='';input.style.height='auto';
  const{msg,body,foot}=addAI();
  thread.scrollTop=thread.scrollHeight;

  const showReasoning=think.getAttribute('aria-checked')==='true';
  const userMsg='[方向：'+CURRENT+']\n'+text;
  let contentText='';

  streamAi('/api/idea',{
    section:'copy',
    messages:[{role:'user',content:userMsg}]
  },{
    onContent(txt){
      contentText+=txt;
      body.textContent=contentText;
      msg.querySelector('.spin')&&(msg.querySelector('.spin').remove());
      thread.scrollTop=thread.scrollHeight;
    },
    onDone(d){
      isStreaming=false;go.disabled=false;goLabel.textContent='改';
      if(!contentText)body.textContent='（空回复，请重试）';
      // 思考拆解
      if(d&&d.reasoning&&showReasoning){
        const rDiv=document.createElement('div');
        rDiv.style.cssText='margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text-3);white-space:pre-wrap;line-height:1.5';
        rDiv.textContent='思考拆解：\n'+d.reasoning;
        body.appendChild(rDiv);
      }
      foot.querySelector('.tag').textContent=CURRENT+' · 改好了';
      thread.scrollTop=thread.scrollHeight;
    },
    onError(msg){
      isStreaming=false;go.disabled=false;goLabel.textContent='改';
      body.textContent='请求失败：'+(msg||'请确认服务器在运行');
      foot.querySelector('.tag').textContent=CURRENT+' · 出错';
    }
  });
});
// 快捷键 Ctrl+Enter
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();go.click();}});
// 新建对话
document.getElementById('newchat').addEventListener('click',()=>{
  document.body.classList.remove('chat');thread.innerHTML='';input.value='';input.style.height='auto';input.focus();
});
</script>
</body>
</html>
